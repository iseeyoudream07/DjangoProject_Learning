<!DOCTYPE html>
{% load static %}  <html lang="en-US">
<head>
    <meta charset="utf-8">
    <title>Learning Log</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

{% include 'includes/navbar.html' %}

{% if site_announcement %}
    <div class="container mb-3">
        <div class="alert alert-warning alert-dismissible fade show text-center shadow-sm" role="alert" style="border-left: 5px solid rgb(32 156 134 / 0.46);">
            <strong> Announcement </strong> {{ site_announcement.content }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>
{% endif %}

    <main class="container">
        {% block content %}{% endblock content %}
    </main>

{% include 'includes/theme_settings.html' %}

</body>
</html>
