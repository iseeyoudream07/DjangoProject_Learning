<!DOCTYPE html>
{% load static %}  <html lang="en-US">
<head>
    <meta charset="utf-8">
    <title>Learning Log</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #5F9EA0;">
        <div class="container">
            <a class="navbar-brand" href="{% url 'learning_app:home' %}" style="font-family: 'Pacifico', cursive; font-size: 2.0rem;">
                Learning Log
            </a>

            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-4">
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#themeModal">Background Sitting</button>
                </li>
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="navbar-text me-3">Hello, {{ user.username }}</span>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'users:logout' %}">
                                {% csrf_token %}
                                <button class="btn btn-outline-danger btn-sm" type="submit">Log out</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'users:login' %}">Log in</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'users:register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock content %}
    </main>

<div id="site-background" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -10; background-size: cover; background-position: center; background-color: #f8f9fa; transition: opacity 0.3s ease;"></div>

    <div class="modal fade" id="themeModal" tabindex="-1" aria-labelledby="themeModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title text-dark fw-bold" id="themeModalLabel">Personalize Background</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-dark">
            <div class="mb-4">
              <label for="bgImageInput" class="form-label fw-bold">1. Choose Local Image (选择本地图片)</label>
              <input class="form-control" type="file" id="bgImageInput" accept="image/*">
            </div>
            <div class="mb-4">
              <label for="bgOpacityRange" class="form-label fw-bold">2. Background Opacity (背景不透明度)</label>
              <input type="range" class="form-range" id="bgOpacityRange" min="0" max="1" step="0.05" value="1">
            </div>
            <div class="text-end">
                <button class="btn btn-outline-danger btn-sm" id="clearBgBtn">Clear Background</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const bgDiv = document.getElementById('site-background');
            const fileInput = document.getElementById('bgImageInput');
            const opacityInput = document.getElementById('bgOpacityRange');
            const clearBtn = document.getElementById('clearBgBtn');

            // 1. 页面加载时，读取浏览器缓存中保存的背景和透明度
            const savedBg = localStorage.getItem('customBgImage');
            const savedOpacity = localStorage.getItem('customBgOpacity');

            if (savedBg) {
                bgDiv.style.backgroundImage = `url(${savedBg})`;
            }
            if (savedOpacity !== null) {
                opacityInput.value = savedOpacity;
                bgDiv.style.opacity = savedOpacity;
            }

            // 2. 监听图片上传事件
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imgData = String(e.target.result);
                        bgDiv.style.backgroundImage = `url(${imgData})`;

                        // 尝试将图片保存到本地缓存，如果图片太大(超过5MB)可能会报错
                        try {
                            localStorage.setItem('customBgImage', imgData);
                        } catch (err) {
                            console.warn("Image size exceeds the limit for cross-page persistence. Please use a compressed image.");
                        }
                    }
                    reader.readAsDataURL(file); // 将图片转换为 Base64 数据流
                }
            });

            // 3. 监听透明度滑块滑动事件
            opacityInput.addEventListener('input', function(event) {
                const val = event.target.value;
                bgDiv.style.opacity = val;
                localStorage.setItem('customBgOpacity', val);
            });

            // 4. 清除背景按钮逻辑
            clearBtn.addEventListener('click', function() {
                bgDiv.style.backgroundImage = 'none';
                fileInput.value = '';
                opacityInput.value = "1";
                bgDiv.style.opacity = "1";
                localStorage.removeItem('customBgImage');
                localStorage.removeItem('customBgOpacity');
            });
        });
    </script>
</body>
</html>
