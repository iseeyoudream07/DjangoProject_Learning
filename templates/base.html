<!DOCTYPE html>
{% load static %}  <html lang="en-US">
<head>
    <meta charset="utf-8">
    <title>Learning Log</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #5F9EA0;">
        <div class="container">
            <a class="navbar-brand" href="{% url 'learning_app:home' %}">Learning Log</a>


                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="navbar-text me-3">Hello, {{ user.username }}</span>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'users:logout' %}">
                                {% csrf_token %}
                                <button class="btn btn-outline-secondary btn-sm" type="submit">Log out</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'users:login' %}">Log in</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'users:register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock content %}
    </main>

</body>
</html>
