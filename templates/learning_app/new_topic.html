{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4" style="min-height: 60vh; align-items: center;">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <h2 class="mb-4 fw-bold text-dark border-bottom pb-3">Add a New Topic</h2>

                <form action="{% url 'learning_app:new_topic' %}" method="post" novalidate>
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold text-secondary mb-1" for="{{ field.id_for_label }}">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% for error in field.errors %}
                                <div class="text-danger small mt-1 fw-bold">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'learning_app:topics' %}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                        <button class="btn btn-custom px-4 shadow-sm" type="submit">Save Topic</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 自動套用 Bootstrap 樣式到輸入框與文字區域
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll("form input, form textarea");
        inputs.forEach(function(input) {
            if (input.type !== "hidden" && input.type !== "submit" && input.type !== "checkbox") {
                input.classList.add("form-control");
            }
        });
    });
</script>
{% endblock content %}
