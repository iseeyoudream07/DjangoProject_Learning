{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4" style="min-height: 60vh; align-items: center;">
    <div class="col-md-10 col-lg-8"> <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4 border-bottom pb-3">
                    <h2 class="fw-bold text-dark mb-2">Add a New Entry</h2>
                    <h5 style="color: 	#48D1CC; text-decoration: none;">Topic: {{ topic }}</h5>
                </div>

                <form action="{% url 'learning_app:new_entry' topic.id %}" method="post" novalidate>
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold text-secondary mb-2" for="{{ field.id_for_label }}">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% for error in field.errors %}
                                <div class="text-danger small mt-1 fw-bold">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'learning_app:topic' topic.id %}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                        <button class="btn btn-custom px-4 shadow-sm" type="submit">Save Entry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 同樣的自動化樣式腳本，已包含對 textarea 的支援
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll("form input, form textarea");
        inputs.forEach(function(input) {
            if (input.type !== "hidden" && input.type !== "submit" && input.type !== "checkbox") {
                input.classList.add("form-control");
                // 若為 textarea，額外設定預設高度
                if (input.tagName.toLowerCase() === 'textarea') {
                    input.style.minHeight = "200px";
                }
            }
        });
    });
</script>
{% endblock content %}
