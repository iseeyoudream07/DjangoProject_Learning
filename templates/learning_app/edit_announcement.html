{% extends 'base.html' %}

{% block content %}
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark fw-bold">Edit Announcement</h2>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form action="{% url 'learning_app:edit_announcement' %}" method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <buttom type="submit" class="btn btn-custom mt-3 px-4">Release/Update Announcement</buttom>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
