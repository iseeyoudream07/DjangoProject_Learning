{% extends 'base.html' %}

{% block content %}
    <h1>Log in</h1>
    {% if form.errors %}
        <p>Your name and your password didn't match.Please try again.</p>
    {% endif %}
    <form method="post" action="{% url 'users:login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
        <input type="hidden" name="next" value="{% url 'learning_app:home' %}">
    </form>
{% endblock content %}
